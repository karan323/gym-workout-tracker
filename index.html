<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GymTracker Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ── Design Tokens ── */
:root {
  --bg:            #08080C;
  --surface:       #111116;
  --surface2:      #18181F;
  --surface3:      #202028;
  --border:        rgba(255,255,255,0.07);
  --border-light:  rgba(255,255,255,0.12);
  --accent:        #7C5CFC;
  --accent-2:      #5B3FE8;
  --accent-dim:    rgba(124,92,252,0.14);
  --accent-glow:   rgba(124,92,252,0.3);
  --green:         #10B981;
  --green-dim:     rgba(16,185,129,0.12);
  --red:           #F43F5E;
  --amber:         #F59E0B;
  --text:          #F2F2F8;
  --text-muted:    #6B6B85;
  --text-dim:      #3E3E52;
  --radius:        14px;
  --radius-sm:     9px;
  --ease-out:      cubic-bezier(0.23, 1, 0.32, 1);
  --ease-in-out:   cubic-bezier(0.77, 0, 0.175, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}

/* Ambient background glow */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse 80% 40% at 50% -10%, rgba(124,92,252,0.12), transparent),
    radial-gradient(ellipse 50% 30% at 90% 90%, rgba(16,185,129,0.05), transparent),
    radial-gradient(ellipse 40% 25% at 10% 70%, rgba(124,92,252,0.06), transparent);
  z-index: 0;
}
.main, .header { position: relative; z-index: 1; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

/* ══════════════════════════════════════
   HEADER
══════════════════════════════════════ */
.header {
  background: rgba(8,8,12,0.75);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  height: 62px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: var(--text);
  flex-shrink: 0;
}
.logo-icon {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
  box-shadow: 0 4px 16px var(--accent-glow);
  flex-shrink: 0;
}
.logo-text {
  font-size: 15px;
  font-weight: 800;
  letter-spacing: -0.4px;
}
.logo-text em { font-style: normal; color: var(--accent); }

.nav-controls {
  display: flex;
  align-items: center;
  gap: 7px;
  flex: 1;
  justify-content: center;
}
.nav-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  letter-spacing: -0.1px;
  transition: color 150ms ease-out, background 150ms ease-out, border-color 150ms ease-out, transform 100ms ease-out;
  display: flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
}
.nav-btn:hover {
  background: var(--surface2);
  color: var(--text);
  border-color: var(--border-light);
}
.nav-btn:active { transform: scale(0.97); }

.date-display {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 7px 18px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  min-width: 200px;
  text-align: center;
  letter-spacing: -0.2px;
  color: var(--text);
}

.today-btn {
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border: none;
  color: #fff;
  padding: 8px 18px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  font-weight: 700;
  font-family: inherit;
  letter-spacing: -0.1px;
  transition: opacity 150ms ease-out, transform 100ms ease-out;
  box-shadow: 0 2px 14px var(--accent-glow);
  flex-shrink: 0;
}
.today-btn:hover { opacity: 0.88; }
.today-btn:active { transform: scale(0.97); }

/* ══════════════════════════════════════
   MAIN LAYOUT
══════════════════════════════════════ */
.main {
  max-width: 1160px;
  margin: 0 auto;
  padding: 28px 28px 100px;
}

/* ══════════════════════════════════════
   STATS STRIP
══════════════════════════════════════ */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 16px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: border-color 200ms ease-out, transform 150ms ease-out;
  cursor: default;
}
.stat-card:hover {
  border-color: var(--border-light);
  transform: translateY(-1px);
}
.stat-icon {
  width: 44px; height: 44px;
  border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
.stat-icon.violet { background: rgba(124,92,252,0.14); }
.stat-icon.green  { background: rgba(16,185,129,0.12); }
.stat-icon.amber  { background: rgba(245,158,11,0.12); }

.stat-content {}
.stat-num {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -1.5px;
  line-height: 1;
  color: var(--text);
}
.stat-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  margin-top: 4px;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}

/* ══════════════════════════════════════
   DAY HERO CARD
══════════════════════════════════════ */
.day-hero {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 22px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.day-hero-left {
  display: flex;
  align-items: center;
  gap: 12px;
}
.day-label {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.6px;
}
.split-tag {
  background: var(--accent-dim);
  color: var(--accent);
  font-size: 10px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  border: 1px solid rgba(124,92,252,0.22);
}
.split-tag.rest {
  background: rgba(107,107,133,0.1);
  color: var(--text-muted);
  border-color: rgba(107,107,133,0.18);
}
.day-hero-right {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
  min-width: 180px;
  max-width: 320px;
}
.progress-bar {
  flex: 1;
  height: 5px;
  background: var(--surface3);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--green));
  border-radius: 3px;
  transition: width 400ms var(--ease-out);
}
.progress-text {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 600;
  white-space: nowrap;
}

/* ══════════════════════════════════════
   COMPLETED BANNER
══════════════════════════════════════ */
.completed-banner {
  background: var(--green-dim);
  border: 1px solid rgba(16,185,129,0.22);
  border-radius: var(--radius);
  padding: 13px 20px;
  margin-bottom: 12px;
  text-align: center;
  font-weight: 700;
  font-size: 14px;
  color: var(--green);
  display: none;
  letter-spacing: -0.1px;
}
.completed-banner.show {
  display: block;
  animation: bannerPop 350ms var(--ease-out);
}
@keyframes bannerPop {
  from { opacity: 0; transform: translateY(-6px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ══════════════════════════════════════
   DAY NOTES
══════════════════════════════════════ */
.day-note {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 20px;
  transition: border-color 200ms ease-out;
}
.day-note:focus-within { border-color: rgba(124,92,252,0.35); }
.day-note label {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1.4px;
  display: block;
  margin-bottom: 9px;
}
.day-note textarea {
  width: 100%;
  background: transparent;
  border: none;
  color: var(--text);
  font-size: 14px;
  resize: none;
  min-height: 48px;
  font-family: inherit;
  outline: none;
  line-height: 1.65;
}
.day-note textarea::placeholder { color: var(--text-dim); }

/* ══════════════════════════════════════
   MUSCLE GROUPS — 2-COLUMN GRID
══════════════════════════════════════ */
.muscle-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  align-items: start;
}

/* ── Individual Muscle Card ── */
.muscle-group {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color 200ms ease-out, box-shadow 200ms ease-out, transform 150ms ease-out;
}
.muscle-group:hover {
  box-shadow: 0 6px 24px rgba(0,0,0,0.35);
  transform: translateY(-1px);
}
.muscle-group.active {
  border-color: rgba(124,92,252,0.38);
  box-shadow: 0 0 0 1px rgba(124,92,252,0.08) inset, 0 4px 20px rgba(124,92,252,0.08);
}
.muscle-group.active:hover {
  box-shadow: 0 0 0 1px rgba(124,92,252,0.1) inset, 0 8px 30px rgba(124,92,252,0.14);
}

/* ── Card Header ── */
.mg-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  cursor: pointer;
  user-select: none;
  transition: background 120ms ease-out;
  gap: 10px;
}
.mg-header:hover { background: rgba(255,255,255,0.02); }
.mg-header:active { background: rgba(255,255,255,0.035); }

.mg-header-left {
  display: flex;
  align-items: center;
  gap: 11px;
  flex: 1;
  min-width: 0;
}
.mg-icon-wrap {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
  transition: background 200ms ease-out, border-color 200ms ease-out;
}
.active .mg-icon-wrap {
  background: var(--accent-dim);
  border-color: rgba(124,92,252,0.22);
}

.mg-info { min-width: 0; }
.mg-name {
  font-size: 13px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 5px;
  letter-spacing: -0.1px;
}
.active-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent-glow);
  flex-shrink: 0;
}
.mg-count {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
  font-weight: 500;
}

.mg-right {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.mg-check-all {
  font-size: 11px;
  color: var(--accent);
  cursor: pointer;
  background: none;
  border: none;
  font-family: inherit;
  font-weight: 600;
  padding: 4px 8px;
  border-radius: 6px;
  letter-spacing: 0.1px;
  transition: background 120ms ease-out, transform 100ms ease-out;
  white-space: nowrap;
}
.mg-check-all:hover { background: var(--accent-dim); }
.mg-check-all:active { transform: scale(0.97); }

.mg-chevron {
  color: var(--text-dim);
  font-size: 10px;
  transition: transform 280ms var(--ease-out);
  flex-shrink: 0;
  line-height: 1;
}
.mg-chevron.open { transform: rotate(180deg); }

/* ── Mini progress inside card header ── */
.mg-mini-bar {
  width: 48px; height: 3px;
  background: var(--surface3);
  border-radius: 2px;
  overflow: hidden;
}
.mg-mini-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--green));
  border-radius: 2px;
  transition: width 300ms var(--ease-out);
}

/* ── Body (smooth max-height expand) ── */
.mg-body {
  overflow: hidden;
  max-height: 0;
  transition: max-height 380ms var(--ease-out), opacity 200ms ease-out;
  opacity: 0;
}
.mg-body.open {
  max-height: 3000px;
  opacity: 1;
}
.mg-body-inner { padding: 0 16px 14px; }

/* ══════════════════════════════════════
   EXERCISE ROWS
══════════════════════════════════════ */
.exercise-row {
  border-top: 1px solid var(--border);
  padding: 9px 0;
  display: flex;
  flex-direction: column;
  gap: 7px;
}
.ex-top {
  display: flex;
  align-items: center;
  gap: 9px;
}

/* Custom checkbox */
.ex-checkbox {
  width: 18px; height: 18px;
  border-radius: 5px;
  border: 1.5px solid var(--surface3);
  background: transparent;
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  flex-shrink: 0;
  position: relative;
  transition: background 140ms ease-out, border-color 140ms ease-out, transform 100ms ease-out;
}
.ex-checkbox:hover { border-color: var(--accent); }
.ex-checkbox:active { transform: scale(0.92); }
.ex-checkbox:checked {
  background: var(--green);
  border-color: var(--green);
}
.ex-checkbox:checked::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -58%) rotate(45deg);
  width: 4px; height: 8px;
  border: 1.5px solid #fff;
  border-top: none;
  border-left: none;
}

.ex-name {
  flex: 1;
  font-size: 13px;
  font-weight: 500;
  transition: color 140ms ease-out, opacity 140ms ease-out;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  letter-spacing: -0.1px;
}
.ex-name.done {
  text-decoration: line-through;
  color: var(--text-muted);
  opacity: 0.6;
}

.ex-remove {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 14px;
  padding: 3px 5px;
  border-radius: 5px;
  line-height: 1;
  transition: color 140ms ease-out, background 140ms ease-out, opacity 140ms ease-out, transform 100ms ease-out;
  opacity: 0;
  flex-shrink: 0;
}
.exercise-row:hover .ex-remove { opacity: 1; }
.ex-remove:hover { color: var(--red); background: rgba(244,63,94,0.1); }
.ex-remove:active { transform: scale(0.9); }

/* 3-column input grid for sets/reps/weight */
.ex-fields {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 5px;
  padding-left: 27px;
}
.ex-field {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 11px;
  font-weight: 500;
  padding: 5px 8px;
  outline: none;
  font-family: inherit;
  transition: border-color 140ms ease-out, background 140ms ease-out;
  width: 100%;
}
.ex-field:focus {
  border-color: rgba(124,92,252,0.5);
  background: rgba(124,92,252,0.05);
}
.ex-field::placeholder {
  color: var(--text-dim);
  font-size: 10px;
  font-weight: 400;
}

/* ── Add Exercise ── */
.add-ex-row {
  display: flex;
  gap: 7px;
  padding-top: 9px;
  border-top: 1px solid var(--border);
  margin-top: 2px;
}
.add-ex-input {
  flex: 1;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text);
  font-size: 12px;
  padding: 7px 11px;
  outline: none;
  font-family: inherit;
  font-weight: 500;
  transition: border-color 140ms ease-out;
}
.add-ex-input:focus { border-color: rgba(124,92,252,0.4); }
.add-ex-input::placeholder { color: var(--text-dim); font-size: 11px; }
.add-ex-btn {
  background: var(--accent-dim);
  border: 1px solid rgba(124,92,252,0.22);
  color: var(--accent);
  border-radius: 7px;
  padding: 7px 13px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 700;
  font-family: inherit;
  letter-spacing: -0.1px;
  transition: background 140ms ease-out, transform 100ms ease-out;
  white-space: nowrap;
}
.add-ex-btn:hover { background: rgba(124,92,252,0.24); }
.add-ex-btn:active { transform: scale(0.97); }

/* ══════════════════════════════════════
   SECTION DIVIDER / LABEL
══════════════════════════════════════ */
.section-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1.4px;
  margin-bottom: 10px;
  padding-left: 2px;
}

/* ══════════════════════════════════════
   DEVICE PREVIEW TOGGLE (iPad / Laptop)
══════════════════════════════════════ */
.preview-bar {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 6px;
  margin-bottom: 16px;
}
.preview-label {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 500;
  margin-right: 4px;
}
.preview-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 5px 11px;
  border-radius: 7px;
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
  font-family: inherit;
  letter-spacing: 0.1px;
  transition: all 140ms ease-out, transform 100ms ease-out;
}
.preview-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--border-light); }
.preview-btn.active { background: var(--accent-dim); border-color: rgba(124,92,252,0.3); color: var(--accent); }
.preview-btn:active { transform: scale(0.97); }

/* ── Device Frame Wrapper ── */
.device-frame-wrap { display: contents; }

/* iPad Frame */
.device-frame-wrap.ipad-mode {
  display: flex;
  justify-content: center;
  padding: 20px 0 40px;
}
.device-frame-wrap.ipad-mode .device-frame {
  width: 768px;
  border-radius: 26px;
  border: 10px solid #1C1C1E;
  box-shadow:
    0 0 0 1px #2C2C2E,
    0 40px 80px rgba(0,0,0,0.8),
    0 0 60px rgba(124,92,252,0.08);
  overflow: hidden;
  background: var(--bg);
  position: relative;
}
.device-frame-wrap.ipad-mode .device-frame::before {
  content: '';
  display: block;
  width: 80px; height: 5px;
  background: #2C2C2E;
  border-radius: 3px;
  margin: 8px auto 6px;
}

/* Laptop Frame */
.device-frame-wrap.laptop-mode {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 0 40px;
}
.device-frame-wrap.laptop-mode .device-frame {
  width: min(1100px, 95vw);
  border-radius: 12px 12px 0 0;
  border: 8px solid #1C1C1E;
  border-bottom: none;
  box-shadow:
    0 0 0 1px #2C2C2E,
    0 30px 60px rgba(0,0,0,0.8),
    0 0 50px rgba(124,92,252,0.07);
  overflow: hidden;
  background: var(--bg);
}
.device-frame-wrap.laptop-mode .laptop-base {
  display: block;
  width: min(1200px, 105vw);
  height: 18px;
  background: linear-gradient(180deg, #1C1C1E 0%, #111 100%);
  border-radius: 0 0 12px 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

/* Normal mode (no frame) */
.device-frame-wrap .device-frame { background: transparent; }
.laptop-base { display: none; }

/* ══════════════════════════════════════
   RESPONSIVE BREAKPOINTS
══════════════════════════════════════ */

/* Tablet / iPad — single smaller layout */
@media (max-width: 900px) {
  .header { padding: 0 18px; }
  .date-display { min-width: 150px; }
  .main { padding: 20px 18px 80px; }
  .muscle-grid { grid-template-columns: 1fr 1fr; }
}

/* Mobile landscape / small tablet */
@media (max-width: 680px) {
  .header { padding: 0 14px; height: 56px; }
  .logo-text { display: none; }
  .date-display { min-width: 130px; font-size: 12px; padding: 6px 10px; }
  .nav-btn { padding: 6px 10px; font-size: 12px; }
  .today-btn { padding: 7px 13px; font-size: 12px; }
  .main { padding: 14px 14px 60px; }
  .stats-grid { gap: 8px; }
  .stat-card { padding: 14px 14px; gap: 11px; }
  .stat-icon { width: 38px; height: 38px; font-size: 17px; }
  .stat-num { font-size: 22px; }
  .muscle-grid { grid-template-columns: 1fr; }
  .preview-bar { display: none; }
}

/* Mobile portrait */
@media (max-width: 480px) {
  .stats-grid { grid-template-columns: repeat(3, 1fr); }
  .stat-card { flex-direction: column; text-align: center; padding: 12px 8px; gap: 6px; }
  .day-hero { flex-direction: column; align-items: flex-start; gap: 10px; }
  .day-hero-right { width: 100%; max-width: 100%; min-width: 0; }
  .nav-controls { gap: 5px; }
  .date-display { min-width: 110px; font-size: 11px; }
}

/* Prefers reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* Touch devices — don't show hover states */
@media (hover: none) and (pointer: coarse) {
  .muscle-group:hover { transform: none; box-shadow: none; }
  .stat-card:hover { transform: none; }
  .ex-remove { opacity: 0.6; }
}

/* Hover-only interactions */
@media (hover: hover) and (pointer: fine) {
  .exercise-row:hover { background: rgba(255,255,255,0.01); border-radius: 6px; }
}
</style>
</head>
<body>

<!-- ══════════════════════════════════
     HEADER
══════════════════════════════════ -->
<header class="header">
  <div class="header-logo">
    <div class="logo-icon">🏋️</div>
    <div class="logo-text">Gym<em>Tracker</em></div>
  </div>

  <div class="nav-controls">
    <button class="nav-btn" onclick="changeDay(-1)">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M7.5 2L3.5 6L7.5 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Prev
    </button>
    <div class="date-display" id="dateDisplay">—</div>
    <button class="nav-btn" onclick="changeDay(1)">
      Next
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M4.5 2L8.5 6L4.5 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="today-btn" onclick="goToday()">Today</button>
  </div>
</header>

<!-- ══════════════════════════════════
     MAIN
══════════════════════════════════ -->
<div class="main">

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon amber">🔥</div>
      <div class="stat-content">
        <div class="stat-num" id="streakCount">0</div>
        <div class="stat-label">Day Streak</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon violet">💪</div>
      <div class="stat-content">
        <div class="stat-num" id="totalDays">0</div>
        <div class="stat-label">Total Workouts</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon green">✅</div>
      <div class="stat-content">
        <div class="stat-num" id="totalExercises">0</div>
        <div class="stat-label">Exercises Done</div>
      </div>
    </div>
  </div>

  <!-- Day hero -->
  <div class="day-hero">
    <div class="day-hero-left">
      <div class="day-label" id="dayLabel">Monday</div>
      <div class="split-tag" id="splitTag">Push Day</div>
    </div>
    <div class="day-hero-right">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-text" id="progressText">0 / 0</div>
    </div>
  </div>

  <!-- Completed banner -->
  <div class="completed-banner" id="completedBanner">
    🎉 Workout complete — incredible session today!
  </div>

  <!-- Day notes -->
  <div class="day-note">
    <label>Day Notes</label>
    <textarea id="dayNoteArea"
      placeholder="How did it feel? Energy, PRs, injuries, anything worth remembering…"
      rows="2"></textarea>
  </div>

  <!-- Device preview bar -->
  <div class="preview-bar">
    <span class="preview-label">Preview as:</span>
    <button class="preview-btn" id="btnLaptop" onclick="setView('laptop')" title="Laptop view">
      💻 Laptop
    </button>
    <button class="preview-btn" id="btnIpad" onclick="setView('ipad')" title="iPad view">
      📱 iPad
    </button>
    <button class="preview-btn" id="btnNormal" onclick="setView('normal')" title="Normal view">
      ✕ Exit Preview
    </button>
  </div>

  <!-- Device frame wrapper -->
  <div class="device-frame-wrap" id="deviceWrap">
    <div class="device-frame" id="deviceFrame">

      <!-- Muscles section label -->
      <div class="section-label" style="padding: 0 2px 10px;" id="muscleLabel">Muscle Groups</div>

      <!-- Muscle groups grid -->
      <div class="muscle-grid" id="muscleGroups"></div>

    </div>
    <div class="laptop-base" id="laptopBase"></div>
  </div>

</div><!-- /main -->

<!-- ══════════════════════════════════
     JAVASCRIPT
══════════════════════════════════ -->
<script>
// ──────────────────────────────────────────
// DATA
// ──────────────────────────────────────────
const MUSCLE_GROUPS = [
  { id:'chest',    name:'Chest',     icon:'💪',
    exercises:['Bench Press','Incline Dumbbell Press','Cable Flyes','Push-ups','Chest Dips','Decline Bench Press'] },
  { id:'back',     name:'Back',      icon:'🦾',
    exercises:['Deadlift','Pull-ups','Lat Pulldown','Seated Cable Row','Bent-Over Barbell Row','Face Pull','Single-Arm Dumbbell Row'] },
  { id:'shoulders',name:'Shoulders', icon:'🏔️',
    exercises:['Overhead Press','Lateral Raises','Front Raises','Reverse Pec Deck','Arnold Press','Upright Row','Shrugs'] },
  { id:'legs',     name:'Legs',      icon:'🦵',
    exercises:['Barbell Squat','Leg Press','Romanian Deadlift','Leg Curl','Leg Extension','Calf Raises','Walking Lunges','Bulgarian Split Squat'] },
  { id:'biceps',   name:'Biceps',    icon:'💪',
    exercises:['Barbell Curl','Hammer Curl','Incline Dumbbell Curl','Preacher Curl','Cable Curl','Concentration Curl'] },
  { id:'triceps',  name:'Triceps',   icon:'🔱',
    exercises:['Skull Crushers','Tricep Pushdown','Overhead Tricep Extension','Tricep Dips','Close-Grip Bench Press','Kickbacks'] },
  { id:'abs',      name:'Abs',       icon:'⚡',
    exercises:['Crunches','Plank','Russian Twists','Hanging Leg Raises','Cable Crunch','Bicycle Crunches','Ab Wheel Rollout'] },
  { id:'cardio',   name:'Cardio',    icon:'🏃',
    exercises:['Treadmill Run','Cycling','Jump Rope','Rowing Machine','Stair Climber','HIIT Sprints','Elliptical'] }
];

const SPLITS = [
  { name:'Push Day',    groups:['chest','shoulders','triceps'] },
  { name:'Pull Day',    groups:['back','biceps'] },
  { name:'Leg Day',     groups:['legs','abs'] },
  { name:'Push Day',    groups:['chest','shoulders','triceps'] },
  { name:'Pull Day',    groups:['back','biceps'] },
  { name:'Full Body',   groups:['chest','back','legs','abs','cardio'] },
  { name:'Rest Day 😴', groups:[] }
];

// ──────────────────────────────────────────
// STATE
// ──────────────────────────────────────────
let currentDate = todayKey();
let data = loadData();
let currentView = 'normal';

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function pad(n) { return String(n).padStart(2,'0'); }

function loadData() {
  try { return JSON.parse(localStorage.getItem('gymTracker') || '{}'); } catch { return {}; }
}
function saveData() {
  localStorage.setItem('gymTracker', JSON.stringify(data));
  updateStats();
}

function getDayData(key) {
  if (!data[key]) {
    data[key] = { note:'', groups:{}, expanded:{} };
    MUSCLE_GROUPS.forEach(mg => {
      data[key].groups[mg.id] = mg.exercises.map(n => ({ name:n, checked:false, sets:'', reps:'', weight:'' }));
      data[key].expanded[mg.id] = false;
    });
    const split = getSplit(key);
    split.groups.forEach(gid => { data[key].expanded[gid] = true; });
  }
  return data[key];
}

function getSplit(key) {
  const d = new Date(key + 'T00:00:00');
  const dow = d.getDay();
  return SPLITS[dow === 0 ? 6 : dow - 1];
}

// ──────────────────────────────────────────
// RENDER
// ──────────────────────────────────────────
function render() {
  const dayData = getDayData(currentDate);
  const split   = getSplit(currentDate);
  const d = new Date(currentDate + 'T00:00:00');
  const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // Header date
  document.getElementById('dateDisplay').textContent =
    `${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;

  // Day hero
  document.getElementById('dayLabel').textContent = DAYS[d.getDay()];
  const tag = document.getElementById('splitTag');
  tag.textContent = split.name;
  tag.className = 'split-tag' + (split.groups.length === 0 ? ' rest' : '');

  // Note
  const noteArea = document.getElementById('dayNoteArea');
  noteArea.value = dayData.note || '';
  noteArea.oninput = () => { dayData.note = noteArea.value; saveData(); };

  // Progress
  let total = 0, done = 0;
  MUSCLE_GROUPS.forEach(mg => {
    (dayData.groups[mg.id] || []).forEach(ex => { total++; if (ex.checked) done++; });
  });
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} / ${total}`;
  document.getElementById('completedBanner').classList.toggle('show', done > 0 && done === total);

  // Render muscle group cards
  const container = document.getElementById('muscleGroups');
  container.innerHTML = '';

  MUSCLE_GROUPS.forEach((mg, mgIndex) => {
    const exList  = dayData.groups[mg.id] || [];
    const isOpen  = !!dayData.expanded[mg.id];
    const mgDone  = exList.filter(e => e.checked).length;
    const isActive = split.groups.includes(mg.id);
    const miniPct  = exList.length ? Math.round(mgDone / exList.length * 100) : 0;

    const card = document.createElement('div');
    card.className = 'muscle-group' + (isActive ? ' active' : '');

    card.innerHTML = `
      <div class="mg-header" onclick="toggleMG('${mg.id}')">
        <div class="mg-header-left">
          <div class="mg-icon-wrap">${mg.icon}</div>
          <div class="mg-info">
            <div class="mg-name">
              ${mg.name}
              ${isActive ? '<span class="active-dot" title="Today\'s focus"></span>' : ''}
            </div>
            <div class="mg-count">${mgDone}/${exList.length} done</div>
          </div>
        </div>
        <div class="mg-right">
          <div class="mg-mini-bar">
            <div class="mg-mini-fill" style="width:${miniPct}%"></div>
          </div>
          <button class="mg-check-all" onclick="event.stopPropagation(); checkAll('${mg.id}')">
            ${mgDone === exList.length && exList.length > 0 ? 'Uncheck' : 'Check All'}
          </button>
          <div class="mg-chevron ${isOpen ? 'open' : ''}">▼</div>
        </div>
      </div>
      <div class="mg-body ${isOpen ? 'open' : ''}" id="mg-body-${mg.id}">
        <div class="mg-body-inner">
          <div id="ex-list-${mg.id}"></div>
          <div class="add-ex-row">
            <input class="add-ex-input" id="add-input-${mg.id}"
              placeholder="Add exercise…"
              onkeydown="if(event.key==='Enter') addExercise('${mg.id}')">
            <button class="add-ex-btn" onclick="addExercise('${mg.id}')">+ Add</button>
          </div>
        </div>
      </div>
    `;
    container.appendChild(card);

    // Render exercises
    const exListEl = card.querySelector(`#ex-list-${mg.id}`);
    exList.forEach((ex, idx) => {
      const row = document.createElement('div');
      row.className = 'exercise-row';
      row.innerHTML = `
        <div class="ex-top">
          <input type="checkbox" class="ex-checkbox" ${ex.checked ? 'checked' : ''}
            onchange="toggleEx('${mg.id}',${idx},this.checked)">
          <div class="ex-name ${ex.checked ? 'done' : ''}" id="exname-${mg.id}-${idx}">${ex.name}</div>
          <button class="ex-remove" onclick="removeEx('${mg.id}',${idx})" title="Remove">✕</button>
        </div>
        <div class="ex-fields">
          <input class="ex-field" type="text" placeholder="Sets" value="${ex.sets||''}"
            oninput="updateField('${mg.id}',${idx},'sets',this.value)">
          <input class="ex-field" type="text" placeholder="Reps" value="${ex.reps||''}"
            oninput="updateField('${mg.id}',${idx},'reps',this.value)">
          <input class="ex-field" type="text" placeholder="Weight" value="${ex.weight||''}"
            oninput="updateField('${mg.id}',${idx},'weight',this.value)">
        </div>
      `;
      exListEl.appendChild(row);
    });
  });

  updateStats();
}

// ──────────────────────────────────────────
// ACTIONS
// ──────────────────────────────────────────
function toggleMG(gid) {
  const dayData = getDayData(currentDate);
  dayData.expanded[gid] = !dayData.expanded[gid];
  saveData();
  const body    = document.getElementById(`mg-body-${gid}`);
  const chevron = body.previousElementSibling.querySelector('.mg-chevron');
  body.classList.toggle('open', dayData.expanded[gid]);
  chevron.classList.toggle('open', dayData.expanded[gid]);
}

function toggleEx(gid, idx, checked) {
  const dayData = getDayData(currentDate);
  dayData.groups[gid][idx].checked = checked;
  saveData();
  const nameEl = document.getElementById(`exname-${gid}-${idx}`);
  if (nameEl) nameEl.className = `ex-name ${checked ? 'done' : ''}`;

  // Update progress bar
  let total = 0, done = 0;
  MUSCLE_GROUPS.forEach(mg => {
    (dayData.groups[mg.id] || []).forEach(ex => { total++; if (ex.checked) done++; });
  });
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} / ${total}`;
  document.getElementById('completedBanner').classList.toggle('show', done > 0 && done === total);

  // Update card count + mini bar
  const list    = dayData.groups[gid] || [];
  const mgDone  = list.filter(e => e.checked).length;
  const miniPct = list.length ? Math.round(mgDone / list.length * 100) : 0;
  const countEl = document.querySelector(`#mg-body-${gid}`)?.previousElementSibling?.querySelector('.mg-count');
  if (countEl) countEl.textContent = `${mgDone}/${list.length} done`;
  const miniFill = document.querySelector(`#mg-body-${gid}`)?.previousElementSibling?.querySelector('.mg-mini-fill');
  if (miniFill) miniFill.style.width = miniPct + '%';
  const checkAllBtn = document.querySelector(`#mg-body-${gid}`)?.previousElementSibling?.querySelector('.mg-check-all');
  if (checkAllBtn) checkAllBtn.textContent = (mgDone === list.length && list.length > 0) ? 'Uncheck' : 'Check All';
}

function updateField(gid, idx, field, value) {
  const dayData = getDayData(currentDate);
  dayData.groups[gid][idx][field] = value;
  saveData();
}

function checkAll(gid) {
  const dayData = getDayData(currentDate);
  const list    = dayData.groups[gid] || [];
  const allDone = list.every(e => e.checked);
  list.forEach(e => e.checked = !allDone);
  saveData();
  render();
}

function removeEx(gid, idx) {
  const dayData = getDayData(currentDate);
  dayData.groups[gid].splice(idx, 1);
  saveData();
  render();
}

function addExercise(gid) {
  const input = document.getElementById(`add-input-${gid}`);
  const name  = (input.value || '').trim();
  if (!name) return;
  const dayData = getDayData(currentDate);
  dayData.groups[gid].push({ name, checked:false, sets:'', reps:'', weight:'' });
  dayData.expanded[gid] = true;
  saveData();
  render();
  setTimeout(() => {
    const el = document.getElementById(`add-input-${gid}`);
    if (el) el.focus();
  }, 50);
}

function changeDay(delta) {
  const d = new Date(currentDate + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  currentDate = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  render();
}

function goToday() {
  currentDate = todayKey();
  render();
}

// ──────────────────────────────────────────
// STATS
// ──────────────────────────────────────────
function updateStats() {
  let totalDays = 0, totalEx = 0, streak = 0;
  const keys  = Object.keys(data).sort();
  const today = todayKey();

  keys.forEach(k => {
    let dayDone = false;
    MUSCLE_GROUPS.forEach(mg => {
      (data[k]?.groups?.[mg.id] || []).forEach(ex => {
        if (ex.checked) { totalEx++; dayDone = true; }
      });
    });
    if (dayDone) totalDays++;
  });

  // Streak — consecutive days back from today
  let check = new Date(today + 'T00:00:00');
  while (true) {
    const k = `${check.getFullYear()}-${pad(check.getMonth()+1)}-${pad(check.getDate())}`;
    let dayDone = false;
    MUSCLE_GROUPS.forEach(mg => {
      (data[k]?.groups?.[mg.id] || []).forEach(ex => { if (ex.checked) dayDone = true; });
    });
    if (!dayDone) break;
    streak++;
    check.setDate(check.getDate() - 1);
  }

  document.getElementById('streakCount').textContent    = streak;
  document.getElementById('totalDays').textContent      = totalDays;
  document.getElementById('totalExercises').textContent = totalEx;
}

// ──────────────────────────────────────────
// DEVICE PREVIEW
// ──────────────────────────────────────────
function setView(mode) {
  const wrap = document.getElementById('deviceWrap');
  const frame = document.getElementById('deviceFrame');
  const base  = document.getElementById('laptopBase');

  // Reset classes
  wrap.className = 'device-frame-wrap';
  frame.style.cssText = '';
  base.style.display = 'none';

  // Reset buttons
  ['btnNormal','btnIpad','btnLaptop'].forEach(id => {
    document.getElementById(id).classList.remove('active');
  });

  currentView = mode;

  if (mode === 'ipad') {
    wrap.classList.add('ipad-mode');
    document.getElementById('btnIpad').classList.add('active');
  } else if (mode === 'laptop') {
    wrap.classList.add('laptop-mode');
    base.style.display = 'block';
    document.getElementById('btnLaptop').classList.add('active');
  } else {
    document.getElementById('btnNormal').classList.add('active');
  }
}

// ──────────────────────────────────────────
// INIT
// ──────────────────────────────────────────
setView('normal');
render();
</script>
</body>
</html>
